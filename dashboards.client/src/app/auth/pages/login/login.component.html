<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h2>Dashboards</h2>
      <p *ngIf="!showResetForm">Sign in to your account</p>
      <p *ngIf="showResetForm && !showForgotPassword">Set a new password</p>
      <p *ngIf="showForgotPassword">Reset your password</p>
    </div>

    <!-- Error / Success Messages -->
    <div class="alert alert-danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
    <div class="alert alert-success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <!-- Login Form -->
    <form *ngIf="!showResetForm && !showForgotPassword" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          [disabled]="loading"
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing in...</span>
      </button>

      <div class="forgot-password-link">
        <a href="javascript:void(0)" (click)="onShowForgotPassword()">Forgot Password?</a>
      </div>
    </form>

    <!-- Reset Password Form -->
    <form *ngIf="showResetForm || showForgotPassword" (ngSubmit)="onResetPassword()">
      <div class="form-group" *ngIf="showForgotPassword">
        <label for="resetUsername">Username</label>
        <input
          type="text"
          id="resetUsername"
          [(ngModel)]="username"
          name="resetUsername"
          placeholder="Enter your username"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="Enter new password"
          autocomplete="new-password"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm new password"
          autocomplete="new-password"
          [disabled]="loading"
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Update Password</span>
        <span *ngIf="loading">Updating...</span>
      </button>

      <button type="button" class="btn-back" (click)="onBackToLogin()">
        Back to Login
      </button>
    </form>
  </div>
</div>
